name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build & Release Agent
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create releases and push tags

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set version
        id: version
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build Linux binaries
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o cloudnan-agent-linux-amd64 ./cmd/agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o cloudnan-agent-linux-arm64 ./cmd/agent

      - name: Write version file
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: echo "${VERSION}" > version.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Agent ${{ steps.version.outputs.VERSION }}
          body: |
            Automated release from commit ${{ github.sha }}
          files: |
            cloudnan-agent-linux-amd64
            cloudnan-agent-linux-arm64
            version.txt
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
