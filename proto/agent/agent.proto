syntax = "proto3";

package agent;

option go_package = "github.com/cloudnan-tech/cloudnan-agent/proto/agent";

// AgentService handles communication between Control Plane and Agent
service AgentService {
  // Register - Agent registers itself with Control Plane
  rpc Register(RegisterRequest) returns (RegisterResponse);
  
  // CommandStream - Bidirectional stream for sending commands and receiving responses
  rpc CommandStream(stream CommandResponse) returns (stream Command);
  
  // StreamMetrics - Agent streams system metrics to Control Plane
  rpc StreamMetrics(stream MetricsData) returns (stream MetricsAck);
  
  // StreamLogs - Agent streams logs to Control Plane in real-time
  rpc StreamLogs(stream LogEntry) returns (stream LogAck);
  
  // Heartbeat - Keep-alive ping
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  
  // GetContainerStats - Get real-time stats for containers
  rpc GetContainerStats(ContainerStatsRequest) returns (ContainerStatsResponse);
}

// ============== Registration ==============

message RegisterRequest {
  string agent_id = 1;        // Unique agent identifier (generated or assigned)
  string hostname = 2;        // VPS hostname
  string ip_address = 3;      // Public IP
  string os = 4;              // e.g., "ubuntu", "debian", "centos"
  string os_version = 5;      // e.g., "22.04"
  string arch = 6;            // e.g., "amd64", "arm64"
  string agent_version = 7;   // Agent binary version
  map<string, string> labels = 8;  // Custom labels for grouping
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
  string assigned_id = 3;     // Control Plane may assign a different ID
  int32 heartbeat_interval = 4;  // Seconds between heartbeats
}

// ============== Commands ==============

message Command {
  string id = 1;              // Unique command ID
  CommandType type = 2;       // Type of command
  repeated string args = 3;   // Command arguments
  map<string, string> env = 4;  // Environment variables
  int32 timeout_seconds = 5;  // Max execution time (0 = no limit)
  bool stream_output = 6;     // Stream stdout/stderr in real-time
  string working_dir = 7;     // Working directory for command
}

enum CommandType {
  COMMAND_TYPE_UNSPECIFIED = 0;
  COMMAND_TYPE_EXEC = 1;      // Execute shell command
  COMMAND_TYPE_INSTALL = 2;   // apt/yum install
  COMMAND_TYPE_SERVICE = 3;   // systemctl start/stop/restart
  COMMAND_TYPE_DOCKER = 4;    // Docker operations
  COMMAND_TYPE_FILE = 5;      // File operations (read/write/delete)
  COMMAND_TYPE_SCRIPT = 6;    // Execute script content
  COMMAND_TYPE_SSH = 7;       // SSH key/config operations
  COMMAND_TYPE_CHECK_MODULE = 8;  // Check if module binaries exist on filesystem
  COMMAND_TYPE_RECONNECT = 9;     // Internal blue-green deploy handoff signal
  // Database management. args[0] = operation name (one of
  // "discover", "connect", "disconnect", "ping", "list_dbs", "list_users",
  // "create_db", "drop_db", "create_user", "grant", "drop_user", "exec_query",
  // "export_dump"); args[1] = JSON-encoded Database*Request payload.
  // Streaming results are delivered as multiple CommandResponse messages
  // whose stdout each contains one JSON-encoded chunk.
  COMMAND_TYPE_DATABASE = 10;
}

message CommandResponse {
  string command_id = 1;
  CommandStatus status = 2;
  int32 exit_code = 3;
  string stdout = 4;          // For streaming, partial output
  string stderr = 5;
  int64 started_at = 6;       // Unix timestamp
  int64 completed_at = 7;     // Unix timestamp (0 if still running)
}

enum CommandStatus {
  COMMAND_STATUS_UNSPECIFIED = 0;
  COMMAND_STATUS_PENDING = 1;
  COMMAND_STATUS_RUNNING = 2;
  COMMAND_STATUS_COMPLETED = 3;
  COMMAND_STATUS_FAILED = 4;
  COMMAND_STATUS_TIMEOUT = 5;
  COMMAND_STATUS_CANCELLED = 6;
}

// ============== Metrics ==============

message MetricsData {
  string agent_id = 1;
  int64 timestamp = 2;        // Unix timestamp
  
  // CPU
  double cpu_percent = 3;     // Overall CPU usage %
  repeated double cpu_per_core = 4;  // Per-core usage
  
  // Memory
  uint64 memory_total = 5;    // Total RAM in bytes
  uint64 memory_used = 6;     // Used RAM in bytes
  uint64 memory_available = 7;
  double memory_percent = 8;
  uint64 memory_cached = 16;
  uint64 memory_buffers = 17;
  uint64 swap_total = 18;
  uint64 swap_used = 19;
  uint64 swap_free = 20;
  double swap_percent = 21;
  
  // Disk
  repeated DiskMetrics disks = 9;
  repeated DiskIO disk_io = 22;
  
  // Network
  uint64 network_bytes_sent = 10;
  uint64 network_bytes_recv = 11;
  uint64 connections = 23;
  
  // Load average (Linux)
  double load_1 = 12;
  double load_5 = 13;
  double load_15 = 14;
  
  // Uptime & Host
  uint64 uptime_seconds = 15;
  HostInfo host_info = 24;
  
  // Services & Containers
  repeated ServiceInfo services = 25;
  repeated ContainerInfo containers = 26;
  
  // Firewall
  FirewallInfo firewall = 27;
  
  // Processes
  repeated ProcessInfo processes = 28;

  // CPU extended
  double cpu_steal_time = 29;
  double cpu_iowait = 30;

  // Network extended
  uint64 net_errin = 31;
  uint64 net_errout = 32;
  uint64 net_dropin = 33;
  uint64 net_dropout = 34;
}

message FirewallInfo {
  string status = 1; // "active", "inactive"
  repeated FirewallRule rules = 2;
}

message FirewallRule {
  string index = 1;
  string to = 2;
  string action = 3;
  string from = 4;
  string comment = 5;
  string protocol = 6;
}

message DiskMetrics {
  string mount_point = 1;
  string device = 2;
  uint64 total = 3;
  uint64 used = 4;
  uint64 free = 5;
  double percent = 6;
  string fstype = 7;
  uint64 inodes_total = 8;
  uint64 inodes_used = 9;
  double inodes_percent = 10;
}

message DiskIO {
  string name = 1;  // device name
  uint64 read_count = 2;
  uint64 write_count = 3;
  uint64 read_bytes = 4;
  uint64 write_bytes = 5;
}

message HostInfo {
  string hostname = 1;
  string os = 2;
  string platform = 3;
  string platform_family = 4;
  string platform_version = 5;
  string kernel_version = 6;
  string kernel_arch = 7;
  uint64 boot_time = 8;
  string virtualization_system = 9;
  string virtualization_role = 10;
}

message ServiceInfo {
  string name = 1;
  string status = 2; // "running", "stopped", "unknown"
  int32 restarts = 3;
  string last_restart = 4;
}

message ContainerInfo {
  string id = 1;
  string name = 2;
  string image = 3;
  string status = 4; // "running", "exited", "paused"
  string health = 5; // "healthy", "unhealthy", "none"
  int32 restarts = 6;
  string started_at = 7;
  string state = 8;          // "running", "exited", "paused", "created"
  repeated string ports = 9; // e.g., ["80:8080", "443:8443"]
  string ip_address = 10;    // Container IP
  int64 uptime_seconds = 11; // How long container has been running
}

message ProcessInfo {
  int32 pid = 1;
  string name = 2;
  string username = 3;
  double cpu_percent = 4;
  double mem_percent = 5;
  uint64 rss = 6;
  int64 create_time = 7;
  uint64 disk_read_bytes = 8;   // bytes read since last poll (delta)
  uint64 disk_write_bytes = 9;  // bytes written since last poll (delta)
  uint32 net_connections = 10;  // active TCP/UDP connection count
}

// Real-time container statistics
message ContainerStats {
  string container_id = 1;
  string container_name = 2;
  double cpu_percent = 3;     // CPU usage percentage (0-100+)
  int64 memory_usage = 4;     // Memory usage in bytes
  int64 memory_limit = 5;     // Memory limit in bytes
  double memory_percent = 6;  // Memory usage percentage
  int64 network_rx = 7;       // Network bytes received
  int64 network_tx = 8;       // Network bytes transmitted
  int64 block_read = 9;       // Block I/O read bytes
  int64 block_write = 10;     // Block I/O write bytes
  int32 pids = 11;            // Number of processes
  int64 timestamp = 12;       // Stats collection timestamp
}

// Request for container stats
message ContainerStatsRequest {
  string agent_id = 1;
  repeated string container_ids = 2; // empty = all running containers
}

// Response with multiple container stats
message ContainerStatsResponse {
  repeated ContainerStats stats = 1;
}

message MetricsAck {
  bool received = 1;
}

// ============== Logs ==============

message LogEntry {
  string agent_id = 1;
  int64 timestamp = 2;
  LogLevel level = 3;
  string source = 4;          // "agent", "command:123", "service:nginx"
  string message = 5;
  map<string, string> metadata = 6;
}

enum LogLevel {
  LOG_LEVEL_UNSPECIFIED = 0;
  LOG_LEVEL_DEBUG = 1;
  LOG_LEVEL_INFO = 2;
  LOG_LEVEL_WARN = 3;
  LOG_LEVEL_ERROR = 4;
}

message LogAck {
  bool received = 1;
}

// ============== Heartbeat ==============

message HeartbeatRequest {
  string agent_id = 1;
  int64 timestamp = 2;
  AgentStatus status = 3;
}

message HeartbeatResponse {
  bool acknowledged = 1;
  int64 server_time = 2;
  // Control plane can send config updates
  map<string, string> config_updates = 3;
}

enum AgentStatus {
  AGENT_STATUS_UNSPECIFIED = 0;
  AGENT_STATUS_IDLE = 1;
  AGENT_STATUS_BUSY = 2;
  AGENT_STATUS_ERROR = 3;
}

// ============== SSH Management ==============

// SSHSyncRequest contains SSH keys to sync to authorized_keys
message SSHSyncRequest {
  repeated SSHKeyEntry keys = 1;
  string target_user = 2;     // Target user (e.g., "root", "ubuntu")
  bool replace_all = 3;       // If true, replace entire file; if false, merge
}

message SSHKeyEntry {
  string id = 1;              // Key ID for tracking
  string public_key = 2;      // Full public key line
  string name = 3;            // Human-readable name (for comment)
  bool is_active = 4;         // Only sync active keys
}

message SSHSyncResponse {
  bool success = 1;
  string message = 2;
  int32 keys_synced = 3;      // Number of keys written
  string backup_path = 4;     // Path to backup file if created
}

// SSHConfigRequest updates sshd_config settings
message SSHConfigRequest {
  optional int32 port = 1;              // SSH port (default 22)
  optional bool permit_root_login = 2;  // PermitRootLogin setting
  optional bool password_auth = 3;      // PasswordAuthentication setting
  optional bool pubkey_auth = 4;        // PubkeyAuthentication setting  
  bool restart_sshd = 5;                // Restart sshd after changes
  bool validate_config = 6;             // Run sshd -t before applying
}

message SSHConfigResponse {
  bool success = 1;
  string message = 2;
  string backup_path = 3;     // Path to config backup
  bool sshd_restarted = 4;    // Whether sshd was restarted
}

// SSHStatusRequest gets current SSH configuration
message SSHStatusRequest {}

message SSHStatusResponse {
  int32 current_port = 1;
  bool permit_root_login = 2;
  bool password_auth = 3;
  bool pubkey_auth = 4;
  string sshd_status = 5;     // "running", "stopped", "unknown"
  int32 authorized_keys_count = 6;
}

// ============== Database Management ==============

enum DatabaseEngine {
  DATABASE_ENGINE_UNSPECIFIED = 0;
  DATABASE_ENGINE_MYSQL = 1;
  DATABASE_ENGINE_MARIADB = 2;
  DATABASE_ENGINE_POSTGRESQL = 3;
}

// How the agent reaches a particular DB instance on this host.
message DatabaseConnection {
  string host = 1;            // "127.0.0.1", "localhost"
  uint32 port = 2;            // 0 if connecting via unix socket
  string socket_path = 3;     // optional explicit unix socket path
  bool use_tls = 4;
  string tls_ca_pem = 5;      // optional CA cert; otherwise system trust
}

// Identifies an instance the agent has been told about. The agent's local
// credential vault holds the actual creds keyed by instance_id.
message DatabaseInstanceRef {
  string instance_id = 1;
}

// ---- Discovery ----

message DatabaseDiscoverRequest {
  // Empty = scan for all supported engines.
  repeated DatabaseEngine engines = 1;
}

message DatabaseDiscoverResponse {
  repeated DatabaseDiscoveryCandidate candidates = 1;
}

message DatabaseDiscoveryCandidate {
  DatabaseEngine engine = 1;
  string discovery_method = 2;          // "systemd", "docker", "port_scan"
  string display_name = 3;              // human-readable label for UI
  DatabaseConnection connection = 4;
  string version = 5;                   // detected server version, may be empty
  string systemd_unit = 6;              // empty unless discovery_method == systemd
  string docker_container_id = 7;
  string docker_container_name = 8;
  bool credentials_auto_extracted = 9;  // agent already has working creds
  string credentials_source = 10;       // human-readable source explanation
}

// ---- Connect / Disconnect / Ping ----

message DatabaseConnectRequest {
  string instance_id = 1;               // assigned by control plane
  DatabaseEngine engine = 2;
  DatabaseConnection connection = 3;
  string username = 4;
  string password = 5;
  // For an auto-discovered instance the agent may already have creds.
  // Pass the discovery hint and the agent reuses local creds.
  string discovery_hint = 6;            // e.g. "systemd:mysql.service"
}

message DatabaseConnectResponse {
  bool success = 1;
  string message = 2;
  string server_version = 3;
}

message DatabaseDisconnectResponse {
  bool success = 1;
}

message DatabasePingResponse {
  bool reachable = 1;
  uint64 latency_ms = 2;
  string server_version = 3;
}

// ---- Listing ----

message DatabaseEntry {
  string name = 1;
  uint64 size_bytes = 2;
  string charset = 3;
  string collation = 4;
  string owner = 5;                     // PostgreSQL only
}

message DatabaseListDBsResponse {
  repeated DatabaseEntry databases = 1;
}

message DatabaseUserEntry {
  string username = 1;
  string host = 2;                      // MySQL/MariaDB host part; "%" if any
  repeated string granted_databases = 3;
}

message DatabaseListUsersResponse {
  repeated DatabaseUserEntry users = 1;
}

// ---- Create / Drop ----

message DatabaseCreateOwnerUser {
  string username = 1;
  string password = 2;
  string host = 3;                      // MySQL/MariaDB; "%" if empty
  bool grant_all_on_db = 4;
}

message DatabaseCreateDBRequest {
  DatabaseInstanceRef instance = 1;
  string database_name = 2;
  string charset = 3;                   // engine default if empty
  string collation = 4;
  DatabaseCreateOwnerUser owner = 5;    // optional companion user
}

message DatabaseCreateDBResponse {
  bool success = 1;
  string message = 2;
}

message DatabaseDropDBRequest {
  DatabaseInstanceRef instance = 1;
  string database_name = 2;
  string confirmation_token = 3;
}

message DatabaseDropDBResponse {
  bool success = 1;
  string message = 2;
}

message DatabaseCreateUserRequest {
  DatabaseInstanceRef instance = 1;
  string username = 2;
  string password = 3;
  string host = 4;                      // MySQL/MariaDB; "%" if empty
}

message DatabaseCreateUserResponse {
  bool success = 1;
  string message = 2;
}

message DatabaseGrantRequest {
  DatabaseInstanceRef instance = 1;
  string username = 2;
  string host = 3;
  string database_name = 4;
  repeated string privileges = 5;       // engine-specific names; "ALL" for full
  bool revoke = 6;
}

message DatabaseGrantResponse {
  bool success = 1;
  string message = 2;
}

message DatabaseDropUserRequest {
  DatabaseInstanceRef instance = 1;
  string username = 2;
  string host = 3;
  string confirmation_token = 4;
}

message DatabaseDropUserResponse {
  bool success = 1;
  string message = 2;
}

// ---- Query runner ----

message DatabaseExecQueryRequest {
  DatabaseInstanceRef instance = 1;
  string database_name = 2;             // engine-appropriate USE / search_path
  string sql = 3;
  bool read_only = 4;                   // agent rejects destructive statements
  uint32 row_limit = 5;                 // truncate result set; 0 = engine default cap
  uint32 timeout_seconds = 6;
  string confirmation_token = 7;        // required when read_only=false
}

message DatabaseQueryResultChunk {
  oneof body {
    DatabaseQueryHeader header = 1;
    DatabaseQueryRow row = 2;
    DatabaseQueryFooter footer = 3;
    DatabaseQueryError error = 4;
  }
}

message DatabaseQueryHeader {
  repeated string columns = 1;
  repeated string column_types = 2;     // engine-specific type names
}

message DatabaseQueryRow {
  // Per-cell encoding: cells[i] holds the UTF-8 / canonical-text repr.
  // is_null[i] disambiguates NULL from empty string. Both arrays parallel.
  repeated bytes cells = 1;
  repeated bool is_null = 2;
}

message DatabaseQueryFooter {
  uint64 row_count = 1;
  uint64 affected_rows = 2;             // for non-SELECT
  uint64 elapsed_ms = 3;
  bool truncated = 4;                   // hit row_limit
}

message DatabaseQueryError {
  string code = 1;                      // engine-specific
  string message = 2;
  uint32 line = 3;
}

// ---- Export / dump ----

message DatabaseExportDestination {
  string destination_id = 1;            // pointer to a backup_destination row
  string object_key_prefix = 2;
}

message DatabaseExportDumpRequest {
  DatabaseInstanceRef instance = 1;
  repeated string database_names = 2;   // empty = all DBs the user can access
  DatabaseExportDestination destination = 3;
  // 32 bytes for AES-256-GCM. Agent encrypts before upload — Cloudnan never
  // holds plaintext or the key. Generated client-side and stored by the
  // user (or escrowed in the customer's KMS).
  bytes encryption_key = 4;
  bool compress = 5;                    // gzip before encryption
}

enum DatabaseExportPhase {
  DATABASE_EXPORT_PHASE_UNSPECIFIED = 0;
  DATABASE_EXPORT_PHASE_DUMPING = 1;
  DATABASE_EXPORT_PHASE_UPLOADING = 2;
  DATABASE_EXPORT_PHASE_COMPLETED = 3;
  DATABASE_EXPORT_PHASE_FAILED = 4;
}

message DatabaseExportProgress {
  DatabaseExportPhase phase = 1;
  uint64 bytes_processed = 2;
  uint64 bytes_total_estimate = 3;      // 0 if unknown
  string current_database = 4;
  string object_key = 5;                // populated on PHASE_COMPLETED
  uint64 final_size_bytes = 6;
  string error_message = 7;
}
