# Agent configuration
agent:
  # Unique agent identifier (leave empty to auto-generate)
  id: ""
  
  # Human-readable name for this agent
  name: "my-vps-agent"
  
  # Custom labels for grouping/filtering
  labels:
    environment: "production"
    region: "asia-southeast"

# Control Plane connection
control_plane:
  # gRPC endpoint of Control Plane
  address: "grpc.your-panel-domain.com:9443"
  
  # Connection timeout
  timeout: 30s
  
  # Reconnection settings
  reconnect_interval: 5s
  max_reconnect_attempts: 0  # 0 = infinite

# TLS configuration
tls:
  # Enable TLS
  enabled: true

  # Use system root CAs instead of a custom CA (set automatically when connecting
  # via Cloudflare Tunnel — port 443). When true, mTLS is disabled and auth relies
  # on the Bearer token. Leave false for direct gRPC connections (port 9443, mTLS).
  use_system_certs: false

  # Path to CA certificate (mTLS only, ignored when use_system_certs is true)
  ca_cert: "/etc/cloudnan/certs/ca.crt"

  # Path to agent certificate (mTLS only, ignored when use_system_certs is true)
  cert: "/etc/cloudnan/certs/agent.crt"

  # Path to agent private key (mTLS only, ignored when use_system_certs is true)
  key: "/etc/cloudnan/certs/agent.key"

  # Skip server certificate verification (NOT recommended for production)
  insecure_skip_verify: false

# Metrics collection
metrics:
  # Enable metrics collection
  enabled: true
  
  # Collection interval
  interval: 10s
  
  # Metrics to collect
  collect:
    cpu: true
    memory: true
    disk: true
    network: true
    load: true

# Logging
logging:
  # Log level: debug, info, warn, error
  level: "info"
  
  # Log format: json, text
  format: "text"
  
  # Log file (empty = stdout)
  file: "/var/log/cloudnan-agent.log"
  
  # Enable log streaming to Control Plane
  stream_to_control_plane: true

# Command execution
executor:
  # Default shell for command execution
  shell: "/bin/bash"
  
  # Default command timeout (0 = no limit)
  default_timeout: 300s
  
  # Allowed command prefixes (empty = allow all)
  allowed_commands: []
  
  # Blocked command prefixes
  blocked_commands:
    - "rm -rf /"
    - "mkfs"
